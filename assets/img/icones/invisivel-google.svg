<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Magnifying glass -->
  <circle cx="28" cy="28" r="16" stroke="#0F3B5C" stroke-width="2.5" fill="#F8FAFC"/>
  <line x1="40" y1="40" x2="52" y2="52" stroke="#0F3B5C" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Empty search result page inside glass -->
  <rect x="20" y="20" width="16" height="6" rx="1" fill="#E2E8F0" opacity="0.5"/>
  <rect x="22" y="28" width="12" height="3" rx="1" fill="#E2E8F0" opacity="0.3"/>
  <rect x="24" y="33" width="8" height="2" rx="1" fill="#E2E8F0" opacity="0.2"/>
  <!-- Broken link / not found -->
  <path d="M36 20l-6 6M30 20l6 6" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Question mark -->
  <text x="26" y="44" fill="#F59E0B" font-size="10" font-weight="bold">?</text>
  <!-- Small location pin (indicating local search) -->
  <path d="M50 16a4 4 0 100 8 4 4 0 000-8z" fill="#F59E0B" opacity="0.4"/>
  <text x="46" y="17" fill="white" font-size="5" font-weight="bold">X</text>
</svg>
